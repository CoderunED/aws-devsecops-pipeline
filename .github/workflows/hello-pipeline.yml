name: Hello Security Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm pipeline is running
        run: echo "Security pipeline started successfully"

      - name: List files in repo
        run: ls -la

      - name: Print today's date
        run: date

      - name: Show Python version
        run: python3 --version
