name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep — community rules
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-community.json \
            app/ || true

      - name: Run Semgrep — custom rules
        run: |
          semgrep scan \
            --config .semgrep/rules.yml \
            --json \
            --output semgrep-custom.json \
            app/ || true

      - name: Run Trufflehog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
        continue-on-error: true
      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov IaC scan
        run: |
          checkov \
            --directory terraform/ \
            --output json \
            --output-file checkov-results.json \
            --soft-fail
          echo "Checkov scan complete"

      - name: Show Checkov findings summary
        run: |
          python3 -c "
          import json
          with open('checkov-results.json') as f:
              data = json.load(f)

          if isinstance(data, list):
              data = data[0]

          results = data.get('results', {})
          failed = results.get('failed_checks', [])
          passed = results.get('passed_checks', [])

          print(f'=== CHECKOV RESULTS ===')
          print(f'Passed checks: {len(passed)}')
          print(f'Failed checks: {len(failed)}')
          print()
          print('--- Failed checks ---')
          for check in failed:
              print(f'  [FAIL] {check[\"check_id\"]} — {check[\"check_name\"]}')
              print(f'         Resource: {check[\"resource\"]}')
          "

      - name: Show Semgrep findings summary
        run: |
          python3 -c "
          import json

          total = 0
          for fname in ['semgrep-community.json', 'semgrep-custom.json']:
              with open(fname) as f:
                  data = json.load(f)
              findings = data.get('results', [])
              total += len(findings)
              print(f'--- {fname}: {len(findings)} findings ---')
              for finding in findings:
                  sev = finding['extra']['severity']
                  path = finding['path']
                  line = finding['start']['line']
                  rule = finding['check_id'].split('.')[-1]
                  print(f'  [{sev}] {path}:{line} — {rule}')

          print(f'TOTAL SEMGREP FINDINGS: {total}')
          "

      - name: Upload all results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            semgrep-community.json
            semgrep-custom.json
