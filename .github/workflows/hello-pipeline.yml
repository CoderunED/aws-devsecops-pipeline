name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install semgrep checkov anthropic

      - name: Run Semgrep — community rules
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-community.json \
            app/ || true

      - name: Run Semgrep — custom rules
        run: |
          semgrep scan \
            --config .semgrep/rules.yml \
            --json \
            --output semgrep-custom.json \
            app/ || true

      - name: Run Trufflehog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
        continue-on-error: true

      - name: Run Checkov IaC scan
        run: |
          checkov \
            --directory terraform/ \
            --output cli \
            --output json \
            --output-file-path checkov-output \
            --soft-fail
          echo "Checkov scan complete"

      - name: Show Checkov findings summary
        run: |
          python3 -c "
          import json
          import os

          results_file = None
          for f in os.listdir('checkov-output'):
              if f.endswith('.json'):
                  results_file = f'checkov-output/{f}'
                  break

          if not results_file:
              print('No results file found')
              exit(1)

          with open(results_file) as f:
              data = json.load(f)

          if isinstance(data, list):
              data = data[0]

          results = data.get('results', {})
          failed = results.get('failed_checks', [])
          passed = results.get('passed_checks', [])

          print(f'=== CHECKOV RESULTS ===')
          print(f'Passed checks: {len(passed)}')
          print(f'Failed checks: {len(failed)}')
          "

      - name: Show Semgrep findings summary
        run: |
          python3 -c "
          import json

          total = 0
          for fname in ['semgrep-community.json', 'semgrep-custom.json']:
              with open(fname) as f:
                  data = json.load(f)
              findings = data.get('results', [])
              total += len(findings)
              print(f'--- {fname}: {len(findings)} findings ---')
              for finding in findings:
                  sev = finding['extra']['severity']
                  path = finding['path']
                  line = finding['start']['line']
                  rule = finding['check_id'].split('.')[-1]
                  print(f'  [{sev}] {path}:{line} — {rule}')
          print(f'TOTAL SEMGREP FINDINGS: {total}')
          "

      - name: Run AI security summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ai_summarizer.py

      - name: Post AI summary as PR comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 -c "
          import os
          import json
          import urllib.request

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']

          with open('ai-summary.md') as f:
              summary = f.read()

          comment = f'## 🔒 Automated Security Scan Results\n\n{summary}\n\n---\n*Posted automatically by the DevSecOps pipeline*'

          url = f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments'
          data = json.dumps({'body': comment}).encode()
          req = urllib.request.Request(url, data=data, method='POST')
          req.add_header('Authorization', f'Bearer {token}')
          req.add_header('Content-Type', 'application/json')
          req.add_header('Accept', 'application/vnd.github.v3+json')

          with urllib.request.urlopen(req) as response:
              print(f'Comment posted — status: {response.status}')
          "

      - name: Upload all results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            semgrep-community.json
            semgrep-custom.json
            checkov-output/
            ai-summary.md
